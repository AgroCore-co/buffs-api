# ========================================
# BUFFS API - Infraestrutura de Produção (EC2)
# ========================================
# Uso:
#   cd /home/ec2-user/buffs-api
#   docker-compose -f infra/docker-compose.prod.yml up -d --build
#
# Variáveis de ambiente lidas do .env na raiz do projeto.
# IMPORTANTE: RABBITMQ_URL deve ser amqp://admin:admin@rabbitmq:5672
#             (hostname interno Docker, não localhost)
# ========================================

services:
  # ========================================
  # RabbitMQ - Message Broker
  # ========================================
  rabbitmq:
    # OTIMIZAÇÃO: sem management plugin → economiza ~60-80 MB
    image: rabbitmq:3.13-alpine
    container_name: buffs-rabbitmq
    hostname: buffs-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      # Porta 15672 removida: management UI desabilitado
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_DEFAULT_VHOST: /
      # Limita uso de memória do RabbitMQ a 128 MB
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.15 -rabbit vm_memory_high_watermark_paging_ratio 0.75"
    deploy:
      resources:
        limits:
          memory: 150m
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - buffs-network

  # ========================================
  # Buffs ETL Worker - Go
  # ========================================
  # Worker Go responsável pelo processamento de planilhas XLSX.
  # Recebe chamadas da API via HTTP interno (porta 8081).
  # ========================================
  buffs-etl-worker:
    build:
      context: ../../buffs-etl-worker
      dockerfile: Dockerfile
    image: buffs-etl-worker:latest
    container_name: buffs-etl-worker
    restart: unless-stopped
    expose:
      - "8081"
    env_file:
      - ../.env
    volumes:
      # Compartilha pasta de uploads com a API
      - ../temp/uploads:/app/temp/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - buffs-network

  # ========================================
  # Buffs API - NestJS
  # ========================================
  buffs-api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: buffs-api:latest
    container_name: buffs-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      # Sobrescreve RABBITMQ_URL para usar hostname interno Docker
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      NODE_ENV: production
      # buffs-ia roda no host na porta 8000
      IA_API_URL: http://host.docker.internal:8000
      # ETL Worker roda no serviço interno
      ETL_BASE_URL: http://buffs-etl-worker:8081
      # Limita heap do Node.js a 256 MB
      NODE_OPTIONS: "--max-old-space-size=256"
    deploy:
      resources:
        limits:
          memory: 350m
    extra_hosts:
      # Permite acessar serviços do host (ex: buffs-ia na porta 8000)
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq:
        condition: service_healthy
      buffs-etl-worker:
        condition: service_healthy
    volumes:
      # Bind mount: compartilha uploads com o Worker Go
      # No container: /app/temp/uploads → No host: ./temp/uploads
      - ../temp/uploads:/app/temp/uploads
    networks:
      - buffs-network

# ========================================
# Volumes Persistentes
# ========================================
volumes:
  rabbitmq_data:
    driver: local

# ========================================
# Network Interna
# ========================================
networks:
  buffs-network:
    driver: bridge
    name: buffs-network-prod
