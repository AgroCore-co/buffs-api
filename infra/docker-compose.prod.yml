# ========================================
# BUFFS API - Producao (Servidor Dedicado)
# ========================================
# Uso:
#   cd /home/ec2-user/buffs-api
#   docker-compose -f infra/docker-compose.prod.yml up -d --build
#
# Variaveis de ambiente lidas do .env na raiz do projeto.
# ========================================

services:
  # ========================================
  # RabbitMQ - Message Broker
  # ========================================
  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: buffs-rabbitmq
    hostname: buffs-rabbitmq
    restart: unless-stopped
    expose:
      - "5672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.15 -rabbit vm_memory_high_watermark_paging_ratio 0.75"
    deploy:
      resources:
        limits:
          memory: 150m
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - buffs-network

  # ========================================
  # Buffs ETL Worker - Go
  # ========================================
  buffs-etl-worker:
    build:
      context: ../../buffs-etl-worker
      dockerfile: Dockerfile
    image: buffs-etl-worker:latest
    container_name: buffs-etl-worker
    restart: unless-stopped
    expose:
      - "8081"
    env_file:
      - ../.env
    environment:
      BUFFS_ETL_PORT: 8081
      BUFFS_ETL_INTERNAL_KEY: ${ETL_INTERNAL_KEY}
      BUFFS_ETL_DB_URL: ${BUFFS_ETL_DB_URL}
    volumes:
      - ../temp/uploads:/app/temp/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - buffs-network

  # ========================================
  # Buffs IA - FastAPI
  # ========================================
  buffs-ia:
    build:
      context: ../../buffs-ia
      dockerfile: Dockerfile
      args:
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    image: buffs-ia:latest
    container_name: buffs-ia
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ../.env
    environment:
      MODEL_FILE: /app/models/modelo_producao_individual.joblib
      MODEL_INFO_FILE: /app/models/modelo_producao_individual_info.json
    volumes:
      - ia_models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - buffs-network

  # ========================================
  # Buffs API - NestJS
  # ========================================
  buffs-api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: buffs-api:latest
    container_name: buffs-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      NODE_ENV: production
      IA_API_URL: http://buffs-ia:8000
      ETL_BASE_URL: http://buffs-etl-worker:8081
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_OPTIONS: "--max-old-space-size=256"
    deploy:
      resources:
        limits:
          memory: 350m
    depends_on:
      rabbitmq:
        condition: service_healthy
      buffs-etl-worker:
        condition: service_healthy
      buffs-ia:
        condition: service_healthy
    volumes:
      - ../temp/uploads:/app/temp/uploads
    networks:
      - buffs-network

# ========================================
# Volumes Persistentes
# ========================================
volumes:
  rabbitmq_data:
    driver: local
  ia_models:
    driver: local

# ========================================
# Network Interna
# ========================================
networks:
  buffs-network:
    driver: bridge
    name: buffs-network-prod
