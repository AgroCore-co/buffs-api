name: Deploy BUFFS API to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build do projeto
        run: npm run build

      - name: Parar e copiar para EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: 'dist/,package.json,package-lock.json,ecosystem.config.js,drizzle/'
          target: '/home/ec2-user/buffs-api/'
          strip_components: 0

      - name: Deploy e iniciar aplicação
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ec2-user/buffs-api

            # Parar aplicação
            pm2 stop buffs-api 2>/dev/null || true
            pm2 delete buffs-api 2>/dev/null || true

            # Criar logs
            mkdir -p logs

            # Verificar arquivos
            [ ! -f .env ] && echo "ERRO: .env não encontrado" && exit 1
            [ ! -d dist ] && echo "ERRO: dist não encontrado" && exit 1

            # Instalar e iniciar
            npm ci --omit=dev --no-audit
            pm2 start ecosystem.config.js --env production
            pm2 save

            # Aguardar e verificar
            sleep 5
            curl -f http://localhost:3001/health || exit 1

            echo "Deploy concluído!"
            pm2 status
