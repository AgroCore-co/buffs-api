name: Deploy BUFFS Stack — PI-53

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout repos ────────────────────────────────────────────────────
      - name: Checkout buffs-api
        uses: actions/checkout@v4

      - name: Checkout buffs-etl-worker
        uses: actions/checkout@v4
        with:
          repository: AgroCore-co/buffs-etl-worker
          path: buffs-etl-worker
          token: ${{ secrets.GH_PAT }}

      - name: Checkout buffs-ia
        uses: actions/checkout@v4
        with:
          repository: AgroCore-co/buffs-ia
          path: buffs-ia
          token: ${{ secrets.GH_PAT }}

      # ── 2. Build das imagens ─────────────────────────────────────────────────
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build buffs-api
        run: |
          docker build -t buffs-api:latest .
          echo "✅ buffs-api built"

      - name: Build buffs-etl-worker
        run: |
          docker build -t buffs-etl-worker:latest ./buffs-etl-worker
          echo "✅ buffs-etl-worker built"

      - name: Build buffs-ia
        run: |
          docker build \
            --build-arg SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --build-arg SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -t buffs-ia:latest \
            ./buffs-ia
          echo "✅ buffs-ia built"

      # ── 3. Empacotar tudo ────────────────────────────────────────────────────
      - name: Empacotar imagens e código-fonte
        run: |
          # Salvar as 3 imagens em um único tar
          docker save buffs-api:latest buffs-etl-worker:latest buffs-ia:latest \
            | gzip > buffs-images.tar.gz
          echo "📦 Imagens: $(du -sh buffs-images.tar.gz | cut -f1)"

          # Empacotar código-fonte (compose, scripts, etc.)
          tar -czf deploy.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='dist' \
            --exclude='coverage' \
            --exclude='logs' \
            --exclude='buffs-etl-worker' \
            --exclude='buffs-ia' \
            .
          echo "📦 Código: $(du -sh deploy.tar.gz | cut -f1)"

      # ── 4. Copiar para o servidor ────────────────────────────────────────────
      - name: Copiar arquivos para PI-53
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          source: 'deploy.tar.gz,buffs-images.tar.gz'
          target: '/root/'

      # ── 5. Deploy via SSH ────────────────────────────────────────────────────
      - name: Deploy no PI-53
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          command_timeout: 15m
          script: |
            set -e
            cd /root

            echo "─── Backup do .env ───"
            if [ -f buffs-api/.env ]; then
              cp buffs-api/.env /tmp/.env.backup
              echo "✅ .env salvo em backup"
            fi

            echo "─── Recriando diretório buffs-api ───"
            rm -rf buffs-api
            mkdir -p buffs-api

            echo "─── Extraindo código-fonte ───"
            tar -xzf deploy.tar.gz -C buffs-api/
            rm deploy.tar.gz

            echo "─── Restaurando .env ───"
            if [ -f /tmp/.env.backup ]; then
              mv /tmp/.env.backup buffs-api/.env
              echo "✅ .env restaurado"
            fi

            cd buffs-api

            echo "─── Verificando .env ───"
            [ ! -f .env ] && echo "❌ ERRO: .env não encontrado em /root/buffs-api/.env" && exit 1
            echo "✅ .env presente"

            echo "─── Parando containers antigos ───"
            docker compose -f infra/docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

            echo "─── Liberando espaço em disco ───"
            docker image prune -af 2>/dev/null || true
            docker container prune -f 2>/dev/null || true
            docker volume prune -f 2>/dev/null || true
            echo "Espaço disponível: $(df -h / | tail -1 | awk '{print $4}')"

            echo "─── Carregando imagens Docker ───"
            docker load < /root/buffs-images.tar.gz
            rm /root/buffs-images.tar.gz
            echo "✅ Imagens carregadas:"
            docker images | grep -E "buffs-api|buffs-etl|buffs-ia"

            echo "─── Subindo stack ───"
            docker compose -f infra/docker-compose.prod.yml up -d --no-build

            echo "─── Aguardando serviços inicializarem ───"
            sleep 20

            echo "─── Health check da API ───"
            curl -f http://localhost:3001/health || (
              docker compose -f infra/docker-compose.prod.yml logs --tail=50 buffs-api
              exit 1
            )

            echo "─── Status dos containers ───"
            docker compose -f infra/docker-compose.prod.yml ps

            echo ""
            echo "╔══════════════════════════════════════╗"
            echo "║   ✅ DEPLOY CONCLUÍDO — PI-53         ║"
            echo "╠══════════════════════════════════════╣"
            echo "║  API  → http://187.95.52.86:9008     ║"
            echo "║  LAN  → http://10.37.56.252:3001     ║"
            echo "╚══════════════════════════════════════╝"
